version: '3.8'
services:
  mysqldb:
    image: mysql:8.0
    container_name: mysql-container
    restart: always
    environment:
      - MYSQL_DATABASE=auth_app
      - MYSQL_ROOT_PASSWORD=root
      - MYSQL_USER=user
      - MYSQL_PASSWORD=user
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data: